<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>{{ subject }}</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f5f5;">
  <tr>
    <td align="center" style="padding:20px 10px;">
      <table width="100%" cellpadding="0" cellspacing="0" style="max-width:640px;background-color:#ffffff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);">

        <!-- Header -->
        <tr>
          <td style="padding:32px 40px 24px;border-bottom:1px solid #e8e8e8;">
            <table width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td>
                  <div style="font-size:13px;color:#888;margin-bottom:4px;letter-spacing:0.5px;">{{ title_tag }}</div>
                  <h1 style="margin:0;font-size:24px;font-weight:700;color:#1a1a1a;line-height:1.3;">
                    {% block title %}{{ title }}{% endblock %}
                  </h1>
                  <div style="margin-top:6px;font-size:14px;color:#666;">{{ date_str }}</div>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="padding:24px 40px 32px;">
            {% block content %}{% endblock %}
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="padding:20px 40px 28px;border-top:1px solid #e8e8e8;">
            <table width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td style="font-size:12px;color:#999;line-height:1.6;">
                  <p style="margin:0 0 6px;">
                    Generated by <strong>AI Information Collector</strong>
                    &middot; Powered by DeepSeek V3
                  </p>
                  <p style="margin:0;">
                    <a href="{{ unsubscribe_url }}" style="color:#999;text-decoration:underline;">Unsubscribe</a>
                    &middot; Reply "unsubscribe" to stop receiving
                  </p>
                </td>
              </tr>
            </table>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
</body>
</html>
